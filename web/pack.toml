[pack]
id = "web"
name = "Web (HTML & presentations)"
version = "0.1.0"

[detect]
# Match a web project without being a catch-all: any one of these markers.
any_of = ["package.json", "index.html"]
ignored_dirs = ["node_modules", ".git", "dist", ".chrome-tmp"]

[context]
core = "context/core.md"
lean_stub = "context/lean.md"
