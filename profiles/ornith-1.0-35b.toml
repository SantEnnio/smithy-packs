# Profile for ornith-1.0-35b served locally by LM Studio.
#
# ornith is a REASONING model: it emits a separate `reasoning_content` trace and
# a short visible `content` that carries the tool call. The output budget must
# leave room for the reasoning PLUS the tool call / a file write — the generic
# default (2048) can starve a reasoning turn and truncate the call, so we raise it
# like the other reasoning models (qwen). That's the ONLY reason this profile
# exists now.
#
# NATIVE function calling (which fixed the empty-`args` quirk of feedback #57/#59,
# where the path lived only in the reasoning) is no longer set here: it is the
# backend default (`Provider::supports_native_tools`), so ornith gets it for free.
# Set `native_tool_calls = false` under [capability] only to force the textual
# protocol back on.
#
# effective_context_length is a conservative budget default. Set the real window
# per model in Settings → Modelli to match `lms load --context-length`.

[model]
id = "ornith-1.0-35b"
family = "ornith"
context_length = 32768
effective_context_length = 16384
max_output_tokens = 7000
chat_template = "chatml"

[strategy]
temperature_base = 0.2
