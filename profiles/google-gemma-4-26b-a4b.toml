# Tuned profile for google/gemma-4-26b-a4b (MoE, 4B active) on the remote 4090.
#
# Like qwen3.6-27b this is a REASONING model (200-950 reasoning tokens even on
# trivial prompts), so the same logic applies: give the output budget room for
# reasoning + a full file, keep history lean, and match effective_context to
# the ~21.2K LM Studio JIT-loads it with. See qwen-qwen3.6-27b.toml for the
# full rationale.

[model]
id = "google/gemma-4-26b-a4b"
family = "gemma"
context_length = 32768
effective_context_length = 20000
max_output_tokens = 7000
chat_template = "gemma"

[capability]
needs_explicit_format_examples = true

[strategy]
temperature_base = 0.2

[budget]
max_history_tokens = 1200
context_safety_margin = 512
